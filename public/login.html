<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · Bank of Dad</title>
<style>
  :root { --ink:#1C2733; --sub:#5C6675; --line:#d9dee6; --accent:#34c759; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--ink); background: #FBF6EA; display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .card { width: 100%; max-width: 380px; background: #fff; border: 1px solid var(--line); border-radius: 18px; padding: 30px 26px; box-shadow: 0 20px 50px rgba(28,39,51,.08); }
  h1 { font-size: 24px; letter-spacing: -0.02em; margin-bottom: 6px; }
  p.sub { color: var(--sub); font-size: 15px; margin-bottom: 20px; }
  label { display: block; font-size: 13px; color: var(--sub); margin-bottom: 6px; }
  input { width: 100%; font-size: 16px; padding: 12px 14px; border: 1.5px solid var(--line); border-radius: 10px; outline: none; }
  input:focus { border-color: var(--ink); }
  button { width: 100%; margin-top: 16px; font-size: 16px; font-weight: 600; color: #fff; background: var(--ink); border: none; border-radius: 10px; padding: 13px; cursor: pointer; }
  button:disabled { opacity: .6; }
  .msg { margin-top: 16px; font-size: 14px; color: var(--sub); text-align: center; min-height: 1.2em; }
  .msg.ok { color: #1e7a37; }
  .brand { font-weight: 700; margin-bottom: 18px; }
  .brand .dot { color: var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Bank of Dad<span class="dot">.</span></div>
    <h1>Sign in</h1>
    <p class="sub">Enter your email and we'll send you a one-time sign-in link. No password.</p>
    <label for="email">Email</label>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" />
    <button id="go">Email me a link</button>
    <div class="msg" id="msg" role="status" aria-live="polite"></div>
    <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--line);text-align:center">
      <a href="/app?demo=1" style="font-size:14px;color:var(--sub);text-decoration:none">or <span style="color:var(--ink);font-weight:600;text-decoration:underline">try the demo</span> — no email needed</a>
    </div>
  </div>
<script>
  const email = document.getElementById('email');
  const go = document.getElementById('go');
  const msg = document.getElementById('msg');
  async function submit() {
    const val = (email.value || '').trim();
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(val)) { msg.className = 'msg'; msg.textContent = 'Please enter a valid email.'; return; }
    go.disabled = true; msg.className = 'msg'; msg.textContent = 'Sending…';
    try {
      await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: val }) });
      msg.className = 'msg ok'; msg.textContent = 'Check your email for the sign-in link. It works once and expires in 15 minutes.';
    } catch {
      msg.className = 'msg'; msg.textContent = 'Something went wrong. Please try again.';
    } finally { go.disabled = false; }
  }
  go.addEventListener('click', submit);
  email.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
